<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Taffi</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --accent-blue: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.4);
            --text-light: #f5f5f7;
            --bear-color: #d1b48c;
            --heart-red: #ff4d6d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Initial Sad State: Heavy Grayscale & Dark Vibe */
        body {
            background: #0d0d0d;
            color: #666;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 15px;
            position: relative;
            filter: grayscale(100%);
            transition: all 2.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Magical Transitioned State: Hyper Vibrant Neon Universe */
        body.colored-life {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: var(--text-light);
            filter: grayscale(0%);
            animation: spacePulse 8s infinite ease-in-out alternate;
        }

        /* Moving Background Constellations & Sparks */
        .ambient-spark {
            position: absolute;
            background: #444;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
        }
        body.colored-life .ambient-spark {
            background: radial-gradient(circle, #fff, var(--accent-blue));
            box-shadow: 0 0 12px var(--accent-blue);
        }

        .leaf-particle {
            position: absolute;
            background: #333;
            width: 8px;
            height: 12px;
            border-radius: 0 70% 0 70%;
            pointer-events: none;
            animation: vortexDrift linear infinite;
        }
        body.colored-life .leaf-particle {
            background: linear-gradient(135deg, var(--accent-blue), #4facfe);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            border-radius: 3px;
            animation: explosionFall 3.5s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
            transition: all 2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body.colored-life .container {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.25), inset 0 0 20px rgba(0, 242, 254, 0.1);
            animation: boxShake 0.5s ease-in-out 1;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #555;
            margin-bottom: 5px;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.colored-life h1 {
            background: linear-gradient(90deg, #00f2fe, #4facfe, #9b51e0, #00f2fe);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 4s linear infinite, textPop 1s ease-out 1;
        }

        .subtitle {
            font-size: 1rem;
            color: #444;
            margin-bottom: 25px;
            transition: all 1.5s;
        }
        body.colored-life .subtitle {
            color: #94a3b8;
        }

        /* Interactive SVG Artwork Layout */
        .artwork-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            width: 100%;
            height: 190px;
            margin-bottom: 35px;
            position: relative;
        }

        .tree-container, .bear-container {
            position: relative;
            height: 100%;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.colored-life .tree-container { transform: scale(1.05) translateX(-5px); }
        body.colored-life .bear-container { transform: scale(1.05) translateX(5px); }

        .tree-container { width: 45%; }
        .bear-container { width: 45%; }

        .tree-svg, .bear-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .leaf {
            fill: #444;
            opacity: 0.5;
            transform-origin: center;
            transition: all 2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body.colored-life .leaf {
            fill: var(--accent-blue);
            opacity: 0.95;
            animation: leafSway 3s infinite ease-in-out alternate;
            filter: drop-shadow(0 0 8px var(--accent-blue));
        }

        /* Smooth Beating Heart */
        .beating-heart {
            fill: #222;
            transform-origin: 120px 125px;
            transition: all 1.5s;
        }
        body.colored-life .beating-heart {
            fill: var(--heart-red);
            animation: heartPulse 0.6s infinite alternate cubic-bezier(0.42, 0, 0.58, 1);
        }

        /* Dynamic Expressions Mapping */
        .bear-sad-eye, .bear-sad-brow, .bear-sad-mouth { display: block; }
        .bear-happy-eye, .bear-happy-brow, .bear-happy-mouth, .bear-blush { display: none; }

        body.colored-life .bear-sad-eye, 
        body.colored-life .bear-sad-brow, 
        body.colored-life .bear-sad-mouth { display: none; }

        body.colored-life .bear-happy-eye, 
        body.colored-life .bear-happy-brow, 
        body.colored-life .bear-happy-mouth,
        body.colored-life .bear-blush { display: block; }

        /* Dynamic Blushing Animation */
        .bear-blush {
            fill: #ff8da1;
            opacity: 0;
            transition: opacity 2s ease;
        }
        body.colored-life .bear-blush {
            opacity: 0.6;
            animation: blushGlow 2s infinite ease-in-out alternate;
        }

        #sign-text { fill: #444; font-size: 9px; transition: all 1s; }
        body.colored-life #sign-text { fill: #00f2fe; font-size: 8px; font-weight: 900; }

        /* Counter Styles */
        .counter-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 15px auto;
        }

        .time-card {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            padding: 16px 5px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.colored-life .time-card {
            background: rgba(0, 242, 254, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .time-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: #444;
            transition: all 1.5s;
        }
        body.colored-life .time-value {
            color: #fff;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.5);
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
            margin-top: 3px;
            display: block;
            transition: all 1.5s;
        }
        body.colored-life .time-label {
            color: #94a3b8;
        }

        .seconds-indicator {
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 25px;
            transition: all 1.5s;
        }
        body.colored-life .seconds-indicator {
            color: var(--accent-blue);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        .apology-card {
            max-width: 550px;
            margin: 0 auto 20px auto;
            line-height: 1.6;
            color: #555;
            font-size: 0.95rem;
            transition: all 1.5s;
        }
        body.colored-life .apology-card {
            color: #cbd5e1;
        }

        /* 🚨 Game Area: Question & Button Selection Panel */
        .question-box {
            margin-top: 15px;
            transition: all 0.5s ease;
        }
        body.colored-life .question-box {
            display: none; /* Disappears beautifully once forgiven */
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #777;
            margin-bottom: 15px;
        }

        .btn-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            min-height: 60px;
            position: relative;
        }

        .btn-game {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: border 0.3s, background 0.3s;
        }

        .btn-yes {
            background: #222;
            color: #888;
            border: 1px solid #333;
        }
        .btn-yes:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* 🚨 Movable Trick No Button Style */
        .btn-no {
            background: #1a1a1a;
            color: #555;
            border: 1px solid #252525;
            position: absolute;
            transition: all 0.15s ease;
            z-index: 50;
        }

        #success-msg {
            max-height: 0;
            opacity: 0;
            color: #00f2fe;
            font-size: 1.4rem;
            font-weight: bold;
            overflow: hidden;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.colored-life #success-msg {
            max-height: 80px;
            opacity: 1;
            margin-top: 15px;
            text-shadow: 0 0 15px var(--accent-blue);
            animation: textFloatEffect 2s infinite ease-in-out alternate;
        }

        /* Keyframes Structural Animations */
        @keyframes leafSway { 0% { transform: rotate(-5deg); } 100% { transform: rotate(8deg); } }
        @keyframes heartPulse { to { transform: scale(1.22); filter: drop-shadow(0 0 8px var(--heart-red)); } }
        @keyframes textFlow { to { background-position: 300% center; } }
        @keyframes spacePulse { 0% { background-color: #0f172a; } 100% { background-color: #020617; } }
        @keyframes blushGlow { to { opacity: 0.9; filter: drop-shadow(0 0 4px #ff8da1); } }
        
        @keyframes boxShake {
            0%, 100% { transform: scale(1); }
            20%, 60% { transform: scale(0.98) rotate(-1deg); }
            40%, 80% { transform: scale(1.02) rotate(1deg); }
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes vortexDrift {
            0% { transform: translate(-100px, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translate(calc(100vw + 100px), -100px) rotate(540deg); opacity: 0; }
        }

        @keyframes explosionFall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) scale(0.5) rotate(720deg); opacity: 0; }
        }

        @keyframes textPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes textFloatEffect { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div id="sparkle-layer"></div>

    <div class="container">
        <h1 id="main-title">I am so sorry, Taffi</h1>
        <p class="subtitle" id="main-sub">A life waiting for your forgiveness...</p>

        <!-- Vector Artwork Stage -->
        <div class="artwork-stage">
            <div class="tree-container">
                <svg class="tree-svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMaxMeet">
                    <path d="M100,200 C100,160 90,140 85,120 C80,100 65,85 55,75" stroke="#222" stroke-width="7" stroke-linecap="round" fill="none" id="trunk1"/>
                    <path d="M100,150 C105,125 120,105 135,95 C145,85 155,80 160,65" stroke="#222" stroke-width="5" stroke-linecap="round" fill="none" id="trunk2"/>
                    <path d="M85,120 C90,100 100,85 105,65" stroke="#222" stroke-width="4" stroke-linecap="round" fill="none" id="trunk3"/>
                    
                    <circle class="leaf" cx="55" cy="75" r="10" />
                    <circle class="leaf" cx="25" cy="70" r="8" />
                    <circle class="leaf" cx="160" cy="65" r="12" />
                    <circle class="leaf" cx="135" cy="95" r="9" />
                    <circle class="leaf" cx="105" cy="65" r="11" />
                    <circle class="leaf" cx="120" cy="55" r="8" />
                    <circle class="leaf" cx="75" cy="100" r="9" />
                    <circle class="leaf" cx="145" cy="80" r="10" />
                </svg>
            </div>

            <div class="bear-container">
                <svg class="bear-svg" viewBox="0 0 150 150" preserveAspectRatio="xMidYMaxMeet">
                    <ellipse cx="75" cy="120" rx="40" ry="30" fill="var(--bear-color)" />
                    <ellipse cx="75" cy="120" rx="25" ry="18" fill="#f5deb3" />
                    <circle cx="75" cy="75" r="32" fill="var(--bear-color)" />
                    
                    <!-- Blushing Cheeks Element -->
                    <circle class="bear-blush" cx="54" cy="80" r="6" />
                    <circle class="bear-blush" cx="96" cy="80" r="6" />

                    <circle cx="48" cy="50" r="10" fill="var(--bear-color)" />
                    <circle cx="48" cy="50" r="5" fill="#f5deb3" />
                    <circle cx="102" cy="50" r="10" fill="var(--bear-color)" />
                    <circle cx="102" cy="50" r="5" fill="#f5deb3" />
                    <ellipse cx="75" cy="85" rx="12" ry="8" fill="#f5deb3" />
                    
                    <!-- Sad Expression Vectors -->
                    <polygon class="bear-sad-mouth" points="71,81 79,81 75,85" fill="#3a2e2b" />
                    <path class="bear-sad-mouth" d="M71,89 Q75,85 79,89" stroke="#3a2e2b" stroke-width="2" stroke-linecap="round" fill="none" />
                    <ellipse class="bear-sad-eye" cx="63" cy="73" rx="3.5" ry="5" fill="#3a2e2b" />
                    <ellipse class="bear-sad-eye" cx="87" cy="73" rx="3.5" ry="5" fill="#3a2e2b" />
                    <path class="bear-sad-brow" d="M57,66 L68,69" stroke="#3a2e2b" stroke-width="2" stroke-linecap="round" />
                    <path class="bear-sad-brow" d="M93,66 L82,69" stroke="#3a2e2b" stroke-width="2" stroke-linecap="round" />

                    <!-- Happy Expression Vectors -->
                    <path class="bear-happy-mouth" d="M66,82 Q75,93 84,82" stroke="#3a2e2b" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path class="bear-happy-eye" d="M58,74 Q63,67 68,74" stroke="#3a2e2b" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path class="bear-happy-eye" d="M82,74 Q87,67 92,74" stroke="#3a2e2b" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path class="bear-happy-brow" d="M55,66 Q63,61 70,66" stroke="#3a2e2b" stroke-width="2.5" stroke-linecap="round" fill="none" />
                    <path class="bear-happy-brow" d="M95,66 Q87,61 80,66" stroke="#3a2e2b" stroke-width="2.5" stroke-linecap="round" fill="none" />

                    <!-- Vector Beating Heart -->
                    <path class="beating-heart" d="M120,120 C120,120 115,114 109,114 C103,114 99,119 99,125 C99,133 110,139 120,145 C130,139 141,133 141,125 C141,119 137,114 131,114 C125,114 120,120 120,120 Z"/>

                    <g transform="translate(10, 115)">
                        <rect width="65" height="22" rx="6" fill="#1f293d" stroke="#333" stroke-width="1.5" id="sign-rect"/>
                        <text x="32.5" y="14" fill="#555" font-size="9" text-anchor="middle" id="sign-text">SORRY...</text>
                    </g>
                </svg>
            </div>
        </div>

        <!-- HH MM Timer Layout -->
        <div class="counter-box">
            <div class="time-card">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-card">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
        </div>

        <div class="seconds-indicator">
            <span id="seconds-count">00</span> seconds passing safely...
        </div>

        <div class="apology-card" id="text-card">
            <p>Every single second since January 2023 has been grey. Interact below to bring back the colors to my world, Taffi.</p>
        </div>

        <!-- Interactive Question & Game Selection Panel -->
        <div class="question-box" id="game-panel">
            <div class="question-text">Can you forgive me?</div>
            <div class="btn-panel">
                <button class="btn-game btn-yes" onclick="executeForgivenessTransition()">Yes</button>
                <button class="btn-game btn-no" id="no-button" onmouseover="teleportNoButton()" onclick="teleportNoButton()">No</button>
            </div>
        </div>

        <div id="success-msg">Thank you, Taffi! 💙 My world is bright again!</div>
    </div>

    <script>
        const startDate = new Date("January 1, 2023 00:00:00").getTime();

        function updateCounter() {
            const now = new Date().getTime();
            const difference = now - startDate;

            const totalHours = Math.floor(difference / (1000 * 60 * 60));
            const totalMinutes = Math.floor(difference / (1000 * 60));
            const currentSeconds = Math.floor((difference / 1000) % 60);

            document.getElementById("hours").innerText = totalHours.toLocaleString();
            document.getElementById("minutes").innerText = totalMinutes.toLocaleString();
            document.getElementById("seconds-count").innerText = currentSeconds.toString().padStart(2, '0');
        }

        function createWindEnvironment() {
            const layer = document.getElementById('sparkle-layer');
            const totalSparks = 25;

            for (let i = 0; i < totalSparks; i++) {
                const isLeaf = Math.random() > 0.4;
                const particle = document.createElement('div');
                
                particle.className = isLeaf ? 'leaf-particle' : 'ambient-spark';
                particle.style.top = `${Math.random() * 100}vh`;
                particle.style.left = `${Math.random() * 100}vw`;
                
                if (!isLeaf) {
                    const size = `${2 + Math.random() * 4}px`;
                    particle.style.width = size;
                    particle.style.height = size;
                }
                
                particle.style.animationDuration = `${5 + Math.random() * 7}s`;
                particle.style.animationDelay = `${Math.random() * -10}s`;
                layer.appendChild(particle);
            }
        }

        // 🚨 Movable Core Trigger Engine for No Button Teleportation
        function teleportNoButton() {
            const noBtn = document.getElementById('no-button');
            const panel = noBtn.parentElement;
            
            // Generate safe bounding constraints inside the selection area
            const maxWidth = panel.clientWidth - noBtn.clientWidth;
            const maxHeight = 120; // Expanded height loop bound

            // Calculate randomized safe vectors
            const randomX = Math.floor(Math.random() * maxWidth) - (maxWidth / 2);
            const randomY = Math.floor(Math.random() * maxHeight) - 40;

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // Main Explosive Transition Trigger Matrix
        function executeForgivenessTransition() {
            document.body.classList.add('colored-life');
            
            document.getElementById('main-title').innerText = "Thank You, Taffi!";
            document.getElementById('main-sub').innerText = "The colors are back. Our time keeps growing.";
            document.getElementById('text-card').innerHTML = "<p style='animation: textPop 0.8s ease-out forwards;'>Your forgiveness means everything. Thank you for making my world beautiful and bright again. Let's grow forward together! 💙</p>";
            
            document.getElementById('trunk1').setAttribute('stroke', '#1e293b');
            document.getElementById('trunk2').setAttribute('stroke', '#1e293b');
            document.getElementById('trunk3').setAttribute('stroke', '#1e293b');
            document.getElementById('sign-rect').setAttribute('stroke', '#00f2fe');
            document.getElementById('sign-text').innerText = "THANK YOU!";

            // Fire multi-color confetti storm
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = `${Math.random() * 100}vw`;
                    
                    const colors = ['#00f2fe', '#ff4d6d', '#9b51e0', '#4facfe', '#ff007f'];
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    confetti.style.animationDuration = `${1.5 + Math.random() * 2.5}s`;
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3500);
                }, i * 12);
            }
        }

        updateCounter();
        setInterval(updateCounter, 1000);
        createWindEnvironment();
    </script>
</body>
</html>
